<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>웹 문서 만들기</title>
</head>
<body>
    <h1>웹 기초 기술</h1>
    <p>웹은 인터넷을 통해 정보를 주고 받는 시스템<br>
        웹 페이지는 HTML,CSS,JavaScript 등의 기술로 만들어진당</p>
    <h2>HTML</h2>
    <p>HTML은 웹페이지의 언어이다.<br>
        HTML은 뚝딱뚝딱 하다보면 재미있당</p>
    <h2>CSS</h2>
    <p>CSS은 웹페이지의 언어이다.<br>
        CSS은 하다보면 자존감도 올라가고 진짜 재미있당</p>
    <h2>JavaScript</h2>
    <p>JavaScript은 웹페이지의 언어이다.<br>
        JavaScript은 HTML과 CSS로 쌓은 자존감을 무너트린당</p>

    <!-- 이미지 넣을거임 -->
     <img src="./img/cat.jpg" alt="cat" width="500"> 
    <!-- 링크 넣을거임 -->
     <h2>페이지 연결할거양</h2>
     <a href="http://naver.com" target="_blank">네이버로 이동</a><br>
     <a href="https://www.president.go.kr/" target="_blank">청와대로 이동</a><br>
     <!-- 이미지 링크 넣을거임 -->
     <a href="https://www.president.go.kr/" target="_blank"> <img src="./img/president.png" alt="logo"> </a><br>
</body>
</html>
