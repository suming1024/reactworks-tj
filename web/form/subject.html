<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수강신청 폼</title>
    <link rel="stylesheet" href="../css/major.css">
</head>
<body>
    <div id="wrap">
        <form action="#" method="post">
            <fieldset>
                <legend>수강신청</legend>
                <ul>
                    <li>
                        <label for="cid">학과번호</label>
                        <input type="text" id="cid" name="cid" autofocus required>
                    </li>
                    <li>
                        <label for="sname">이름</label>
                        <input type="text" id="sname" name="sname" value="정반달" readonly>
                    </li>
                    <li>
                        <label for="major">학과</label>
                        <select name="major" id="major" onchange="selectMajor()">
                            <option value="software">컴퓨터공학과</option>
                            <option value="design">시각디자인과</option>
                            <option value="music">실용음악과</option>
                        </select>
                    </li>
                </ul>
            </fieldset>
            <div>
                <input type="submit" value="신청">
                <input type="reset" value="수정">
            </div>
        </form>
    </div>
</body>

<script>

    function selectMajor(){
        //선택목록 요소에 접근
        const major =document.getElementById("major").value;
        alert(`${major}가 선택되었습니다.`)
    }

</script>

</html>
