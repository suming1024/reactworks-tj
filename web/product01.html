<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS 관련 예재</title>
    <style>
        h1{
            color: blueviolet;
            font-weight: 800;
        }
        h2{
            color: forestgreen;
            font-size: 1.2em;
            font-family: serif;
        }
        p:first-of-type{
            background-color: aqua;
            padding: 0.5rem;
            border-radius: 10px;
            width: fit-content;
            
        }
        p:last-of-type{
            background-color: burlywood;
            padding: 0.5rem;
            margin-top: -10px;
            width: fit-content;
        }
    </style>
</head>
<body>
    <h1>세계 10대 푸드</h1>
    <h2>마늘 G.A.R.L.I.C</h2>
    <p>마늘은 맛있지만 입냄새가 장난아니징. 뽀뽀하기엔 좀 애매한 음식이야!</p>
    <p>하지만 항암효과도 있고 아주 멋진 녀석이징</p>
</body>
</html>
