<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>배열 생성 예재</title>
</head>
<body>
    
    <script>

        //배열의 길이가 4인 정수형 배열 생성
        let numbers = new Array(4)
        // console.log(numbers);
        //배열의 값을 할당
        numbers[0]=10;
        numbers[1]=20;
        numbers[2]=30;
        numbers[3]=40;
        numbers[4]=50;

        //for 로 출력
        for(let i=0; i<numbers.length;i++){
            console.log(numbers[i]);
            
        }

    </script>

</body>
</html>
