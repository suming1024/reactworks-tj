<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IF조건문01</title>
</head>
<body>
    <h2>짝수/홀수 판별</h2>
    <div id="result"></div>
    <script>
        const demo=document.getElementById("result")
        let num = parseInt("숫자를 입력하세요.");
        console.log(typeof(num));
        
        if(num%2==0){
            // console.log("짝수입니다.");
            demo.innerHTML=`<b>${num}은 짝수입니다.`
                demo.style.color="blue";
            // demo.textContent=`${num}은 짝수입니다.`
        }else{
            // console.log("홀수입니다.");
            demo.innerHTML=`<b>${num}은 홀수입니다.`
                demo.style.color="red";
            // demo.textContent=`${num}은 홀수입니다.`
        }

    </script>
</body>
</html>
