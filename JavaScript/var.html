<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>변수와 자료형</title>
</head>
<body>
    <!-- 변수는 데이터 저장하려고 이름 붙인 공간 -->
     <script>
        //1. 숫자형-number
        let age = 30;
        let temperature = 24.5;
        
        console.log("나이",age);//한칸 띄어지네
        console.log("나이"+age);
        console.log("온도"+temperature);
        console.log(typeof(age));
        console.log(typeof(temperature));
        
        //2.문자형-string
        let player = "반달애미";
        let city = "서울";

        console.log(typeof(player));
        
        //3.논리형(true/false)-boolean
        let isRaining = false;

        console.log(isRaining);
        console.log(typeof(isRaining));

        //4.undefined - 할당되지않은 값
        let score;
        console.log("점수",score);

        //5.배열-object(객채)
        let fruits = ["사과","바나나","딸기"];

        console.log(fruits);
        console.log(typeof(fruits));
        
        //6.객채
        let student = {
            name:"정반달",
            age: 4,
            city:"서울"
        }

        console.log(student);
        console.log(typeof(student));
        console.log("도시",student.city);
        
        
        

     </script>
</body>
</html>
